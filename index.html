<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>하노이 탑 - 수열 탐구 디지털 학습지</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 16px; }
        
        /* 메인 레이아웃: 왼쪽(게임), 오른쪽(학습지) */
        .main-layout { display: flex; justify-content: center; gap: 30px; max-width: 1200px; width: 100%; align-items: flex-start; }
        
        /* 왼쪽 시뮬레이터 영역 */
        .simulator-section { flex: 1.2; background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .controls { background-color: #f8f9fa; padding: 12px; border-radius: 8px; display: inline-block; margin-bottom: 15px; border: 1px solid #e9ecef; }
        label { font-weight: bold; margin-right: 10px; }
        select { padding: 6px 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 7px 15px; font-size: 14px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 4px; transition: background 0.2s; }
        .btn:hover { background-color: #2980b9; }
        
        .game-container { display: flex; justify-content: center; align-items: flex-end; height: 320px; width: 100%; border-bottom: 8px solid #34495e; position: relative; padding-bottom: 15px; background-color: #fff; margin-top: 10px; }
        .peg { width: 14px; height: 260px; background-color: #95a5a6; border-radius: 7px; position: relative; margin: 0 13%; cursor: pointer; display: flex; flex-direction: column-reverse; align-items: center; transition: background 0.2s; }
        .peg:hover { background-color: #7f8c8d; }
        .disk { height: 24px; border-radius: 12px; color: white; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 3px; box-shadow: 0 3px 6px rgba(0,0,0,0.16); }

        .status-panel { margin-top: 20px; display: flex; justify-content: center; gap: 20px; }
        .status-item { background-color: #f8f9fa; padding: 10px 20px; border-radius: 8px; min-width: 120px; border: 1px solid #e9ecef; }
        .status-label { font-size: 12px; color: #7f8c8d; margin-bottom: 3px; display: block; }
        .status-value { font-weight: bold; font-size: 20px; }
        #moveCount { color: #e74c3c; }
        #minMoves { color: #27ae60; }

        /* 오른쪽 디지털 학습지 영역 */
        .worksheet-section { flex: 1; background-color: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-height: 80vh; overflow-y: auto; text-align: left; }
        .section-title { font-size: 18px; font-weight: bold; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; margin-top: 20px; margin-bottom: 12px; }
        
        .math-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .math-table th, .math-table td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        .math-table th { background-color: #f8f9fa; color: #495057; }
        .math-input { width: 70px; padding: 5px; text-align: center; font-size: 15px; border: 1px solid #ced4da; border-radius: 4px; font-weight: bold; }
        
        .question-box { background-color: #fdfffe; border: 1px solid #d4edda; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .question-text { font-weight: bold; margin-bottom: 8px; color: #155724; font-size: 14px; }
        .text-answer { width: 95%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        .formula-input { width: 120px; padding: 5px; text-align: center; font-size: 14px; border: 1px solid #ced4da; border-radius: 4px; }

        /* 성공 모달 */
        .success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; }
        .success-modal { background: white; padding: 30px 50px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: center; }
        .success-modal h2 { color: #27ae60; margin-top: 0; }
        .highlight { font-weight: bold; color: #e74c3c; }
        
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .game-container { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>하노이 탑과 수열의 귀납적 정의</h1>
    <div class="subtitle">시뮬레이터로 실험하고 우
